name: Fastest Single Plugin SDK Build
on:
  workflow_dispatch:
    inputs:
      PLUGIN_NAME:
        description: luci-app-xxx
        required: true
        default: 'luci-app-timecontrol'
      PLUGIN_REPO:
        required: true
        default: 'https://github.com/kavass168/luci-app-timecontrol-25.12.git'
      PLUGIN_BRANCH:
        default: 'main'

env:
  SDK_URL: https://downloads.immortalwrt.org/releases/25.12.0/targets/mediatek/filogic/immortalwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  SDK_DIR: ${{ github.workspace }}/sdk
  ARCH: aarch64_cortex-a53

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SDK & DL
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_DIR }}
            ${{ env.SDK_DIR }}/dl
          key: filogic-sdk2512-${{ env.ARCH }}

      - name: Get SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          wget -c -q ${{ env.SDK_URL }} -O sdk.tar.zst
          mkdir -p ${{ env.SDK_DIR }}
          tar -xf sdk.tar.zst -C ${{ env.SDK_DIR }} --strip-components=1
          rm -f sdk.tar.zst

      - name: Clone Plugin
        run: |
          cd ${{ env.SDK_DIR }}
          PLG=${{ github.event.inputs.PLUGIN_NAME }}
          git clone --depth 1 --branch ${{ github.event.inputs.PLUGIN_BRANCH }} \
            ${{ github.event.inputs.PLUGIN_REPO }} tmp_plg
          mkdir -p package/$PLG
          mv tmp_plg/$PLG/* package/$PLG/
          rm -rf tmp_plg

          # ---- 修复 Makefile 版本号 ----
          cd package/$PLG
          CUR_VER=$(grep '^[[:space:]]*PKG_VERSION:=' Makefile | head -1 | \
                    sed 's/^[[:space:]]*PKG_VERSION:=//' | \
                    sed 's/[[:space:]]*$//' | \
                    sed 's/-r.*//' | \
                    sed 's/[^0-9.]//g')
          if [ -z "$CUR_VER" ]; then
            CUR_VER="3.2.4"
          fi
          sed -i "s/^[[:space:]]*PKG_VERSION:=.*/PKG_VERSION:=${CUR_VER}/" Makefile
          if grep -q '^[[:space:]]*PKG_RELEASE:=' Makefile; then
            sed -i 's/^[[:space:]]*PKG_RELEASE:=.*/PKG_RELEASE:=1/' Makefile
          else
            echo "PKG_RELEASE:=1" >> Makefile
          fi
          echo "修正后的版本："
          grep '^PKG_VERSION' Makefile
          grep '^PKG_RELEASE' Makefile

      - name: Update & Install Feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a

      - name: Gen Min Config
        run: |
          cd ${{ env.SDK_DIR }}
          rm -rf feeds/packages/libs/libnetfilter-*
          rm -rf feeds/luci/applications/luci-app-diskman
          rm -rf feeds/packages/net/conntrack-tools

          make defconfig
          for pkg in libnetfilter-cttimeout libnetfilter-cthelper libnetfilter-queue luci-app-diskman conntrack-tools; do
            sed -i "/^CONFIG_PACKAGE_${pkg}/d" .config
            echo "CONFIG_PACKAGE_${pkg}=n" >> .config
          done
          sed -i '/^CONFIG_USE_APK/d' .config
          sed -i "/^CONFIG_PACKAGE_${{ github.event.inputs.PLUGIN_NAME }}=/d" .config
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_PACKAGE_${{ github.event.inputs.PLUGIN_NAME }}=m" >> .config
          make defconfig
          grep "^CONFIG_PACKAGE_${{ github.event.inputs.PLUGIN_NAME }}" .config || echo "警告：插件未启用"

      - name: Build Plugin Only
        run: |
          cd ${{ env.SDK_DIR }}
          make -j$(nproc) package/${{ github.event.inputs.PLUGIN_NAME }}/download
          make -j1 package/${{ github.event.inputs.PLUGIN_NAME }}/compile V=s

     # ---------- 打包 apk 文件 ----------
      - name: Package Firmware
        run: |
          cd ${{ env.SDK_DIR }}
          mkdir -p ./upload/
          # 递归查找所有 .apk 文件（包含 packages/ 和 base/ 等子目录）
          find ./bin/packages/${{ env.ARCH }}/ -type f -name "*.apk" -exec cp {} ./upload/ \;
          echo "已复制以下文件："
          ls -l ./upload/

      # ---------- 发布到 Release ----------
      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ github.ref_name }}-${{ github.event.inputs.PLUGIN_NAME }}
          files: ${{ env.SDK_DIR }}/upload/*.apk
          body: |
            编译完成，未测试！
            插件：${{ github.event.inputs.PLUGIN_NAME }}
            架构：${{ env.ARCH }}
            编译时间：$(date -u +"%Y-%m-%d %H:%M:%S UTC")
