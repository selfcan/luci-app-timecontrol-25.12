name: Fastest Single Plugin SDK Build
on:
  workflow_dispatch:
    inputs:
      PLUGIN_NAME:
        description: luci-app-xxx
        required: true
        default: 'luci-app-timecontrol'
      PLUGIN_REPO:
        required: true
        default: 'https://github.com/kavass168/luci-app-timecontrol-25.12.git'
      PLUGIN_BRANCH:
        default: 'main'

env:
  SDK_URL: https://downloads.immortalwrt.org/releases/25.12.0/targets/mediatek/filogic/immortalwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  SDK_DIR: ${{ github.workspace }}/sdk
  ARCH: aarch64_cortex-a53

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 缓存SDK本体 + dl下载目录（必须设置 id）
      - name: Cache SDK & DL
        id: sdk-cache   # <--- 添加 id
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_DIR }}
            ${{ env.SDK_DIR }}/dl
          key: filogic-sdk2512-${{ env.ARCH }}

      # 缓存未命中才下载SDK
      - name: Get SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'   # <--- 正确引用
        run: |
          wget -c -q ${{ env.SDK_URL }} -O sdk.tar.zst
          mkdir -p ${{ env.SDK_DIR }}
          tar -xf sdk.tar.zst -C ${{ env.SDK_DIR }} --strip-components=1
          rm -f sdk.tar.zst

      # 直接克隆插件到 package 目录（修正）
      - name: Clone Plugin
        run: |
          cd ${{ env.SDK_DIR }}
          PLG=${{ github.event.inputs.PLUGIN_NAME }}
          # 1. 克隆到临时目录
          git clone --depth 1 --branch ${{ github.event.inputs.PLUGIN_BRANCH }} \
            ${{ github.event.inputs.PLUGIN_REPO }} tmp_plg
          # 2. 将插件子目录的内容移动到 package/$PLG
          #    注意：源路径是 tmp_plg/luci-app-timecontrol/*，目标路径是 package/$PLG/
          mkdir -p package/$PLG
          mv tmp_plg/luci-app-timecontrol/* package/$PLG/
          # 3. 清理临时目录
          rm -rf tmp_plg

      # 更新feeds并安装所有依赖（修正）
      - name: Update & Install Feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a   # <--- 增加 install

      # 生成极简配置
      - name: Gen Min Config
        run: |
          cd ${{ env.SDK_DIR }}
          make defconfig
          # 禁用不必要的 libnetfilter 包（它们导致编译失败）
          sed -i '/^CONFIG_PACKAGE_libnetfilter-/d' .config
          echo "CONFIG_PACKAGE_libnetfilter-cttimeout=n" >> .config
          echo "CONFIG_PACKAGE_libnetfilter-cthelper=n" >> .config
          echo "CONFIG_PACKAGE_libnetfilter-queue=n" >> .config
          # 确保插件被正确启用，APK 格式开启
          sed -i '/^CONFIG_USE_APK/d' .config
          sed -i "/^CONFIG_PACKAGE_${{ github.event.inputs.PLUGIN_NAME }}=/d" .config
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_PACKAGE_${{ github.event.inputs.PLUGIN_NAME }}=m" >> .config

          # 使用 olddefconfig 自动处理新增选项，无交互
          make olddefconfig


      # 下载依赖 + 编译插件
      - name: Build Plugin Only
        run: |
          cd ${{ env.SDK_DIR }}
          make -j$(nproc) package/${{ github.event.inputs.PLUGIN_NAME }}/download
          # 若编译失败可改为 V=s 调试
          make -j$(nproc) package/${{ github.event.inputs.PLUGIN_NAME }}/compile V=w

      # 打包产物（修正：使用 find 或打包整个目录）
      - name: Archive Output
        run: |
          BIN=${{ env.SDK_DIR }}/bin/packages/${{ env.ARCH }}
          TAR=${{ env.ARCH }}_${{ github.event.inputs.PLUGIN_NAME }}.tar.gz
          # 方式一：打包整个 BIN 目录（最简单）
          tar -zcvf $TAR -C $BIN .
          # 或方式二：只包含插件相关文件（递归查找）
          # find $BIN -type f \( -name "${{ github.event.inputs.PLUGIN_NAME }}*.apk" -o -name "${{ github.event.inputs.PLUGIN_NAME }}*.ipk" \) -exec tar -rvf $TAR -C $BIN {} + 2>/dev/null
          echo "TAR=$TAR" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAR }}
          path: ${{ env.TAR }}

      - name: Release Asset
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}-${{ github.event.inputs.PLUGIN_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: ${{ env.TAR }}
